name: Build KernelSU S20U (GoRhanHee Source)

on:
  workflow_dispatch:

env:
  # Đã chuyển sang mã nguồn của GoRhanHee
  KERNEL_SOURCE: https://github.com/GoRhanHee/kernel_samsung_sm8250
  KERNEL_BRANCH: master
  KERNEL_DEFCONFIG: vendor/z3q_defconfig
  TARGET_ARCH: arm64
  KERNEL_FILE: Image

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-20.04
    
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Cài đặt Dependencies (Ubuntu 20.04)
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python2 python3

    - name: Tải Toolchain (Proton-Clang)
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        cd $GITHUB_WORKSPACE/toolchain
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang

    - name: Tải mã nguồn Kernel GoRhanHee
      run: |
        git clone --depth=1 ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_BRANCH }} android-kernel

    - name: Tích hợp KernelSU bản mới nhất
      run: |
        cd $GITHUB_WORKSPACE/android-kernel
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
        
        # Kích hoạt kprobes
        echo "CONFIG_KPROBES=y" >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}
        echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}
        echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}

    - name: Biên dịch Kernel
      run: |
        cd $GITHUB_WORKSPACE/android-kernel
        export PATH=$GITHUB_WORKSPACE/toolchain/clang/bin:$PATH
        
        make -j$(nproc --all) O=out ARCH=${{ env.TARGET_ARCH }} CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- ${{ env.KERNEL_DEFCONFIG }}
        make -j$(nproc --all) O=out ARCH=${{ env.TARGET_ARCH }} CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Tải file Image lên Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: S20Ultra-GoRhanHee-KernelSU-${{ github.run_id }}
        path: android-kernel/out/arch/${{ env.TARGET_ARCH }}/boot/${{ env.KERNEL_FILE }}
