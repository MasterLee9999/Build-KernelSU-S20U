name: Build KernelSU S20U (GoRhanHee Fixed)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  KERNEL_SOURCE: https://github.com/GoRhanHee/kernel_samsung_sm8250
  TARGET_ARCH: arm64
  KERNEL_FILE: Image

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4.2.2

    - name: Cache Proton-Clang
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: toolchain/clang
        key: proton-clang-v1

    - name: Cài Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          bc bison build-essential ccache curl flex \
          g++-multilib gcc-multilib git libncurses-dev \
          libssl-dev libelf-dev zip zlib1g-dev \
          python3 python-is-python3

    - name: Tải Proton-Clang
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        git clone --depth=1 \
          https://github.com/kdrag0n/proton-clang.git \
          $GITHUB_WORKSPACE/toolchain/clang

    - name: Tải Kernel Source
      run: |
        git clone --depth=1 \
          ${{ env.KERNEL_SOURCE }} \
          $GITHUB_WORKSPACE/android-kernel
        cd $GITHUB_WORKSPACE/android-kernel
        echo "=== Branch đang dùng ==="
        git branch
        echo "=== Commit hiện tại ==="
        git log --oneline -3

    - name: Tích hợp KernelSU Next
      run: |
        cd $GITHUB_WORKSPACE/android-kernel

        git clone --depth=1 \
          https://github.com/KernelSU-Next/KernelSU-Next.git \
          /tmp/ksu-next

        cp -r /tmp/ksu-next/kernel drivers/kernelsu

        if [ ! -f drivers/kernelsu/Kconfig ]; then
          echo "❌ Không có Kconfig! Nội dung /tmp/ksu-next/kernel:"
          ls /tmp/ksu-next/kernel/
          exit 1
        fi
        echo "✅ KernelSU tích hợp thành công!"
        ls drivers/kernelsu/

        grep -q "kernelsu/Kconfig" drivers/Kconfig || \
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig

        echo "=== Verify ==="
        grep -n "kernelsu" drivers/Kconfig

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 3G
        key: ccache-sm8250-4.19

    - name: Tìm defconfig & Build
      run: |
        cd $GITHUB_WORKSPACE/android-kernel
        export PATH=$GITHUB_WORKSPACE/toolchain/clang/bin:$PATH
        export USE_CCACHE=1
        export CCACHE_EXEC=$(which ccache)

        DEFCONFIG=$(find arch/arm64/configs -name "*z3q*defconfig" | head -1)
        if [ -z "$DEFCONFIG" ]; then
          DEFCONFIG=$(find arch/arm64/configs -name "*kona*defconfig" | head -1)
        fi
        if [ -z "$DEFCONFIG" ]; then
          echo "❌ Không tìm thấy defconfig! Danh sách:"
          ls arch/arm64/configs/
          exit 1
        fi
        echo ">>> Dùng defconfig: $DEFCONFIG"
        DEFCONFIG_NAME=$(basename $DEFCONFIG)

        MAKE_ARGS=(
          -j$(nproc --all)
          O=out
          ARCH=arm64
          CC="ccache clang"
          CLANG_TRIPLE=aarch64-linux-gnu-
          CROSS_COMPILE=aarch64-linux-gnu-
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          LLVM_IAS=1
          KCFLAGS="-Wno-error"
        )

        make "${MAKE_ARGS[@]}" $DEFCONFIG_NAME

        scripts/config --file out/.config \
          --disable DEBUG_INFO \
          --enable DEBUG_INFO_NONE 2>/dev/null || true

        make "${MAKE_ARGS[@]}" 2>&1 | tee build.log

        if [ ! -f out/arch/arm64/boot/Image ]; then
          echo "========= LỖI ========="
          grep -n "error:\|fatal error:\|undefined reference\|cannot find" build.log \
            | grep -iv "Werror" | head -50
          echo "========= 30 DÒNG CUỐI ========="
          tail -30 build.log
          exit 1
        fi
        echo "✅ Build thành công!"
        ls -lh out/arch/arm64/boot/

    - name: Debug - Lỗi chi tiết
      if: failure()
      run: |
        echo "===== LỖI ====="
        grep -n "error:\|fatal error:\|undefined\|cannot" \
          $GITHUB_WORKSPACE/android-kernel/build.log \
          | grep -iv "Werror" | head -50
        echo "===== 50 DÒNG CUỐI ====="
        tail -50 $GITHUB_WORKSPACE/android-kernel/build.log

    - name: Đóng gói AnyKernel3
      if: success()
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
        cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/
        [ -f android-kernel/out/arch/arm64/boot/dtbo.img ] && \
          cp android-kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/
        cd AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
        ZIPNAME="KernelSU_G988N_$(date +%Y%m%d_%H%M).zip"
        zip -r9 ../$ZIPNAME . -x .git README.md
        echo "ZIPNAME=$ZIPNAME" >> $GITHUB_ENV

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-G988N-${{ github.run_id }}
        path: |
          ${{ env.ZIPNAME }}
          android-kernel/build.log
        retention-days: 7
