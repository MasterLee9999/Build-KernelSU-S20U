name: Build KernelSU S20U (GoRhanHee - Bản Chuẩn Cuối Cùng)

on:
  workflow_dispatch:

env:
  # Ép tắt cảnh báo Node.js và tương thích với hệ thống mới
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  
  # Thông tin mã nguồn
  KERNEL_SOURCE: https://github.com/GoRhanHee/kernel_samsung_sm8250
  KERNEL_BRANCH: main # Hoặc master, nhánh mặc định
  KERNEL_DEFCONFIG: z3q_kor_singlex_defconfig
  TARGET_ARCH: arm64
  
  # Cấu hình AnyKernel3 (Để tạo file zip flash qua TWRP/KernelSU)
  ANYKERNEL_SOURCE: https://github.com/osm0sis/AnyKernel3
  ANYKERNEL_BRANCH: master

jobs:
  build-kernel:
    name: Build Kernel & Tạo File Zip
    runs-on: ubuntu-latest # Dùng bản Ubuntu mới nhất của GitHub
    
    steps:
    - name: Chuẩn bị môi trường (Khắc phục lỗi Node.js)
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: 1. Cài đặt thư viện biên dịch siêu tốc
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3
        sudo apt-get clean

    - name: 2. Tải Toolchain EVA GCC (Siêu ổn định)
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        cd $GITHUB_WORKSPACE/toolchain
        git clone --depth=1 https://github.com/mvaisakh/gcc-arm64.git gcc-arm64
        git clone --depth=1 https://github.com/mvaisakh/gcc-arm.git gcc-arm

    - name: 3. Tải mã nguồn Kernel S20 Ultra
      run: |
        git clone --depth=1 ${{ env.KERNEL_SOURCE }} $GITHUB_WORKSPACE/android-kernel
        cd $GITHUB_WORKSPACE/android-kernel
        # Cấp quyền cho các file thực thi bên trong để tránh lỗi Permission Denied
        chmod -R +x *.sh scripts/ 2>/dev/null || true

    - name: 4. Thiết lập Cấu hình & Tiêm SuSFS
      run: |
        cd $GITHUB_WORKSPACE/android-kernel
        
        # Tìm file defconfig (bao quát mọi trường hợp)
        FOUND_CONF=$(find arch/arm64/configs -type f \( -name "*z3q*kor*defconfig" -o -name "*z3q*defconfig" \) | head -n 1)
        if [ -z "$FOUND_CONF" ]; then
          echo "=> ❌ LỖI: Kho mã nguồn không có file defconfig cho S20!"
          exit 1
        fi
        
        # Lôi file cấu hình ra ngoài để make dễ đọc
        cp "$FOUND_CONF" arch/arm64/configs/my_s20_defconfig
        
        # Tiêm mã kích hoạt SuSFS max giáp
        cat <<EOF >> arch/arm64/configs/my_s20_defconfig
        CONFIG_KSU=y
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
        CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
        CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        CONFIG_KSU_SUSFS_SUS_SU=y
        EOF
        
        # Nạp cấu hình với đường dẫn Toolchain chuẩn xác
        make -j$(nproc --all) O=out ARCH=${{ env.TARGET_ARCH }} \
        CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/gcc-arm64/bin/aarch64-elf- \
        CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/toolchain/gcc-arm/bin/arm-eabi- \
        my_s20_defconfig

    - name: 5. Bắt đầu Biên Dịch Kernel (Khoảng 20-30 phút)
      run: |
        cd $GITHUB_WORKSPACE/android-kernel
        
        make -j$(nproc --all) O=out ARCH=${{ env.TARGET_ARCH }} \
        CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/gcc-arm64/bin/aarch64-elf- \
        CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/toolchain/gcc-arm/bin/arm-eabi-

    - name: 6. Đóng gói thành file ZIP bằng AnyKernel3
      run: |
        # Chỉ chạy bước này nếu file Image đã được tạo thành công
        if [ -f $GITHUB_WORKSPACE/android-kernel/out/arch/${{ env.TARGET_ARCH }}/boot/Image ]; then
          git clone --depth=1 ${{ env.ANYKERNEL_SOURCE }} -b ${{ env.ANYKERNEL_BRANCH }} $GITHUB_WORKSPACE/AnyKernel3
          cp $GITHUB_WORKSPACE/android-kernel/out/arch/${{ env.TARGET_ARCH }}/boot/Image $GITHUB_WORKSPACE/AnyKernel3/
          cd $GITHUB_WORKSPACE/AnyKernel3
          zip -r9 KernelSU-S20Ultra-GoRhanHee.zip * -x .git README.md *placeholder
        else
          echo "=> ❌ LỖI: Biên dịch thất bại, không tìm thấy file Image!"
          exit 1
        fi

    - name: 7. Tải file ZIP lên Artifacts (Thành phẩm)
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-S20Ultra-GoRhanHee-Zip-${{ github.run_id }}
        path: ${{ github.workspace }}/AnyKernel3/KernelSU-S20Ultra-GoRhanHee.zip
