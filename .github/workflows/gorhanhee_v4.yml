name: Build KernelSU S20U (GoRhanHee Final Fix)

on:
  workflow_dispatch:

env:
  KERNEL_SOURCE: https://github.com/GoRhanHee/kernel_samsung_sm8250
  # Đã xóa đường dẫn vendor/, bắt make tự tìm file defconfig
  KERNEL_DEFCONFIG: z3q_defconfig
  TARGET_ARCH: arm64
  KERNEL_FILE: Image

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Cài đặt Dependencies (Ubuntu 22.04)
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3

    - name: Tải Toolchain (Proton-Clang)
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        cd $GITHUB_WORKSPACE/toolchain
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang

    - name: Tải mã nguồn Kernel
      run: |
        git clone --depth=1 ${{ env.KERNEL_SOURCE }} android-kernel

    - name: Biên dịch Kernel
      run: |
        cd $GITHUB_WORKSPACE/android-kernel
        export PATH=$GITHUB_WORKSPACE/toolchain/clang/bin:$PATH
        
        make -j$(nproc --all) O=out ARCH=${{ env.TARGET_ARCH }} CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- ${{ env.KERNEL_DEFCONFIG }}
        make -j$(nproc --all) O=out ARCH=${{ env.TARGET_ARCH }} CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Tải file Image lên Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: S20Ultra-GoRhanHee-Final-${{ github.run_id }}
        path: android-kernel/out/arch/${{ env.TARGET_ARCH }}/boot/${{ env.KERNEL_FILE }}
